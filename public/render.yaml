# render.yaml - КОНФІГУРАЦІЯ ДЛЯ RENDER DEPLOYMENT
# Цей файл автоматично налаштує розгортання вашого додатка

services:
  - type: web
    name: earning-app
    env: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
