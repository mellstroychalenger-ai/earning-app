<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Earning App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- НАВІГАЦІЙНА ПАНЕЛЬ -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/dashboard.html" class="logo">💰 Earning App</a>
            <div class="nav-menu">
                <a href="/tasks.html" class="nav-link active" data-en="Tasks" data-uk="Завдання" data-ru="Задачи">Tasks</a>
                <a href="/referrals.html" class="nav-link" data-en="Referrals" data-uk="Рефералі" data-ru="Рефералы">Referrals</a>

                <select id="languageSelect" class="language-select">
                    <option value="uk">🇺🇦 Українська</option>

        <!-- КАРТКИ ЗАВДАНЬ -->
        <div class="tasks-grid" id="tasksGrid">

    <footer class="footer">
        <p>&copy; 2026 Earning App. All rights reserved.</p>
